[supervisord]
nodaemon=true

[program:desktop]
; Ejecuta el script principal
command=start-notebook.sh --NotebookApp.ip='0.0.0.0' --NotebookApp.token='' --NotebookApp.base_url='/'

; Evita la advertencia de supervisor ejecutándose como root
user=jovyan
directory=/home/jovyan/work
autostart=true
autorestart=true
startsecs=5
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:jupyter]
; Aquí es donde lanzamos Jupyter como el usuario correcto
user=jovyan
command=jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --NotebookApp.token='' --NotebookApp.password=''
autostart=true
autorestart=true
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0