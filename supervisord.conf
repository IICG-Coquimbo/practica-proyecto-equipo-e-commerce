[supervisord]
nodaemon=true

[program:desktop]
; Ejecuta el script principal
command=start-notebook.sh --NotebookApp.ip='0.0.0.0' --NotebookApp.token='' --NotebookApp.base_url='/'

; Evita la advertencia de supervisor ejecutándose como root
user=jovyan
directory=/home/jovyan/work
autostart=true
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true

stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

priority=10