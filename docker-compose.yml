
services:
  workspace:
    build: .
    container_name: BigData_workspace
    ports:
      - "8888:8888"   # Jupyter Lab
      - "6080:6080"   # Visualizador del Scraper (VNC)
      - "4040:4040"   # Spark UI
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
    dns:
      - 8.8.8.8
      - 1.1.1.1
    user: root
    restart: always
    networks:
      - bigdata_net

  visualizer:
    image: mongo-express
    container_name: BigData_Visualizer
    entrypoint: ["node", "app.js"]
    ports:
      - "8081:8081"   # Mongo Express
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb+srv://Renato_Villalobos:ubeiW7202%40%40%23%25@cluster0.khaasrk.mongodb.net/?retryWrites=true&w=majority
      - ME_CONFIG_BASICAUTH=false
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: always
    networks:
      - bigdata_net

  filebrowser:
    image: filebrowser/filebrowser
    container_name: BigData_FileBrowser
    ports:
      - "8082:80"     # Gestor de archivos
    volumes:
      - .:/srv
    dns:
      - 8.8.8.8
    restart: always
    networks:
      - bigdata_net

networks:
  bigdata_net:
    driver: bridge
    name: BigData_Network_UCN